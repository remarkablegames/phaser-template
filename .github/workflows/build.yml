name: build
on: [push, pull_request]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          cache: npm
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Lint commit message
        run: npx commitlint --from=HEAD~1

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npm run lint:tsc

      - name: Build for page test
        run: npm run build

      - name: Page test
        uses: remarkablemark/page-test-action@v1
        with:
          url: http://localhost:3000
          start: python3 -m http.server 3000 --directory dist
          wait-on: http://localhost:3000

      - name: Set environment variables
        run: |
          echo "VITE_APP_HOMEPAGE=$(jq -r .homepage package.json)" >> $GITHUB_ENV
          echo "VITE_APP_VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV

      - name: Build for deploy
        run: npm run build -- --base /${{ github.event.repository.name }}/
        env:
          VITE_GOOGLE_ANALYTICS_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}

      - name: Deploy
        if: github.ref_name == 'master'
        uses: remarkablemark/gitploy-action@v1
        with:
          directory: dist
